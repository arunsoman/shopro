spring:
  application:
    name: shopro-pos-server
  datasource:
    url: jdbc:postgresql://localhost:5432/shopro_pos
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
server:
  port: 8080

logging:
  level:
    mls.sho.dms: DEBUG
    org.springframework.web: INFO
    org.springframework.messaging: DEBUG
